# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── MCP Server ─────────────────────────────────────────────────────────────────
spring.ai.mcp.server.name=weather-bridge-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.type=SYNC

# SSE endpoint that MCP clients connect to  (Claude Desktop / Claude Code)
spring.ai.mcp.server.sse-endpoint=/sse
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# ── OpenWeatherMap API ──────────────────────────────────────────────────────────
# Set via environment variable: OPENWEATHERMAP_API_KEY=your_key
# Or override directly (never commit real keys to source control)
openweathermap.api-key=${OPENWEATHERMAP_API_KEY:changeme}
openweathermap.base-url=https://api.openweathermap.org/data/2.5

# ── SSE ─────────────────────────────────────────────────────────────────────────
# Disable Tomcat's async request timeout so SSE connections stay open indefinitely
spring.mvc.async.request-timeout=-1

# ── Thread pool ──────────────────────────────────────────────────────────────────
# Keep footprint small on Koyeb nano (0.1 vCPU / 256 MB) — native image uses ~80 MB
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2

# ── Logging ─────────────────────────────────────────────────────────────────────
logging.level.com.example.weatherbridgemcp=INFO
