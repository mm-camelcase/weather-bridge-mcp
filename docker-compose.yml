services:
  weather-bridge-mcp:
    build: .
    ports:
      - "8080:8080"
    environment:
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/weather/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
